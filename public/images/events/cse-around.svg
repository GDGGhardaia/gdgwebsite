<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <rect width="400" height="240" fill="white"/>
  <defs>
    <linearGradient id="cse1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBC04"/>
      <stop offset="100%" style="stop-color:#F9A825"/>
    </linearGradient>
    <linearGradient id="cse2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285F4"/>
      <stop offset="100%" style="stop-color:#1A73E8"/>
    </linearGradient>
  </defs>
  <!-- Circular emblem -->
  <circle cx="200" cy="105" r="75" fill="url(#cse1)" opacity="0.15"/>
  <circle cx="200" cy="105" r="60" stroke="url(#cse1)" stroke-width="4" fill="none"/>
  <circle cx="200" cy="105" r="48" stroke="url(#cse2)" stroke-width="3" fill="none" stroke-dasharray="8 6"/>
  <!-- CSE text -->
  <text x="200" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#333">CSE</text>
  <!-- Around text -->
  <text x="200" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">AROUND</text>
  <!-- Algeria text -->
  <text x="200" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#4285F4">ALGERIA</text>
  <!-- Decorative dots -->
  <circle cx="140" cy="180" r="5" fill="#FBBC04"/>
  <circle cx="260" cy="180" r="5" fill="#4285F4"/>
  <circle cx="200" cy="175" r="4" fill="#34A853"/>
  <!-- GDG collab text -->
  <text x="200" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#999">in collaboration with GDG Ghardaia</text>
</svg>
