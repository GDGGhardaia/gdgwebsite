<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <rect width="400" height="240" fill="white"/>
  <defs>
    <linearGradient id="df1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4285F4"/>
      <stop offset="25%" style="stop-color:#EA4335"/>
      <stop offset="50%" style="stop-color:#FBBC04"/>
      <stop offset="75%" style="stop-color:#34A853"/>
      <stop offset="100%" style="stop-color:#4285F4"/>
    </linearGradient>
  </defs>
  <!-- DevFest logo area -->
  <text x="200" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#333">DevFest</text>
  <rect x="273" y="50" width="40" height="22" rx="4" fill="#4285F4"/>
  <text x="293" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">2024</text>
  <!-- Google dots -->
  <circle cx="145" y="100" r="8" fill="#4285F4" cy="100"/>
  <circle cx="168" cy="100" r="8" fill="#EA4335"/>
  <circle cx="191" cy="100" r="8" fill="#FBBC04"/>
  <circle cx="214" cy="100" r="8" fill="#34A853"/>
  <circle cx="237" cy="100" r="8" fill="#4285F4"/>
  <!-- Google Developers Group text -->
  <text x="200" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">Google Developers Group</text>
  <text x="200" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">Ghardaia</text>
  <!-- GDG Codeathon banner -->
  <rect x="110" y="165" width="180" height="32" rx="6" fill="#34A853"/>
  <text x="200" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">GDG Codeathon</text>
  <!-- Small "first edition" -->
  <text x="200" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#EA4335" font-style="italic">First edition</text>
